<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NectarStream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">🎵 NectarStream</div>
        <ul class="sidebar-menu">
            <li onclick="loadPage('home')">Home</li>
            <li onclick="loadPage('search')">Search</li>
            <li onclick="loadPage('library')">Library</li>
            <li onclick="loadPage('literature')">Literature</li>
            <li onclick="loadPage('studio')">🎧 Studio</li>
            <li onclick="loadPage('login')" style="margin-top: 20px; color: #FF6600;">Login</li>
            <li onclick="logout()" style="color: #d0021b;">Logout</li>
        </ul>
    </nav>

    <main id="app-container">
        <h1>Loading...</h1>
    </main>

    <footer class="player-bar">
        <div class="song-info">
            <span id="current-song">No song playing</span>
        </div>
        
        <div class="progress-container" style="flex-grow: 1; margin: 0 20px;">
            <input type="range" id="progress-bar" value="0" max="100" style="width: 100%;">
        </div>

        <div class="controls">
            <button onclick="prevSong()">⏮</button>
            <button id="play-pause-btn" onclick="togglePlay()">⏯</button>
            <button onclick="nextSong()">⏭</button>
        </div>
        <audio id="global-audio-player"></audio>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
