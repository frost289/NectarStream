<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NectarStream</title>
  <style>
    /* Global Application Styles & Resets */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    body {
      background-color: #121212;
      color: #ffffff;
      min-height: 100vh;
      padding-bottom: 95px; /* Leave breathing room so bottom player bar never blocks elements */
    }

    /* Top Navigation Shell Styling */
    .navbar {
      background-color: #000000;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #1c1c1c;
    }

    .nav-brand {
      color: #1DB954;
      font-size: 1.4rem;
      font-weight: bold;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      color: #b3b3b3;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: #ffffff;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#/" class="nav-brand">NectarStream</a>
    
    <ul class="nav-links">
      <li><a href="#/streams">Streams</a></li>
      <li><a href="#/literature">Literature</a></li>
      <li><a href="#/artist-studio">Artist Studio</a></li>
    </ul>

    <div id="auth-nav-container"></div>
  </nav>

  <main id="app"></main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
